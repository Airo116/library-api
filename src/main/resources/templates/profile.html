<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .card-body {
            padding: 30px;
        }

        .info-row {
            display: flex;
            margin-bottom: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .info-label {
            width: 120px;
            font-weight: bold;
            color: #666;
        }

        .info-value {
            flex: 1;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #666;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .nav-links {
            text-align: center;
            margin-top: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 5px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.3);
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

    </style>
</head>
<body>
<div class="container">
    <div class="nav-links">
        <a href="/">📚 Главная</a>
        <a href="/logout">🚪 Выйти</a>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>👤 Мой профиль</h2>
        </div>
        <div class="card-body">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div th:if="${success}" class="message success" th:text="${success}"></div>
            <div th:if="${error}" class="message error" th:text="${error}"></div>

            <div class="info-row">
                <div class="info-label">Имя пользователя:</div>
                <div class="info-value" th:text="${user.username}"></div>
            </div>
            <div class="info-row">
                <div class="info-label">Полное имя:</div>
                <div class="info-value" th:text="${user.fullName}"></div>
            </div>
            <div class="info-row">
                <div class="info-label">Email:</div>
                <div class="info-value" th:text="${user.email}"></div>



            <div class="info-row">
                <div class="info-label">Дата регистрации:</div>
                <div class="info-value" th:text="${createdAt}"></div>
            </div>
        </div>

    </div>

    <!-- Форма редактирования профиля -->
    <div class="card">
        <div class="card-header">
            <h2>✏️ Редактировать профиль</h2>
        </div>
        <div class="card-body">
            <form method="post" action="/profile/update">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email" th:value="${user.email}" required>
                </div>
                <div class="form-group">
                    <label>Полное имя:</label>
                    <input type="text" name="fullName" th:value="${user.fullName}" required>
                </div>
                <button type="submit">Сохранить изменения</button>
            </form>
        </div>
    </div>

    <!-- Форма смены пароля -->
    <div class="card">
        <div class="card-header">
            <h2>🔑 Сменить пароль</h2>
        </div>
        <div class="card-body">
            <form method="post" action="/profile/change-password">
                <div class="form-group">
                    <label>Текущий пароль:</label>
                    <input type="password" name="currentPassword" required>
                </div>
                <div class="form-group">
                    <label>Новый пароль:</label>
                    <input type="password" name="newPassword" required>
                </div>
                <div class="form-group">
                    <label>Подтвердите новый пароль:</label>
                    <input type="password" name="confirmPassword" required>
                </div>
                <button type="submit">Сменить пароль</button>
            </form>
        </div>
    </div>

    <div class="nav-links" style="margin-top: 20px;">
        <a href="/">← На главную</a>
    </div>
</div>

</body>
</html>
